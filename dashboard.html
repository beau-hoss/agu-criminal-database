<!DOCTYPE html>
<html>
<head>
  <title>AGU Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>AGU Arrest Report Submission</h1>

    <input id="psn" placeholder="Suspect PSN Name">
    <input id="date" type="datetime-local">
    <input id="location" placeholder="Arrest Location">
    <input id="vehicle" placeholder="Suspect Vehicle">
    <input id="property" placeholder="Suspect Property (if any)">
    <input id="charges" placeholder="Charges">
    <input id="station" placeholder="Booking Station">

    <textarea id="details" placeholder="Event Log Details"></textarea>

    <button id="submitBtn">Submit Report</button>
  </div>

  <script src="/script.js"></script>
</body>
</html>
